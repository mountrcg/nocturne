name: Build and Publish with Aspire

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository }}
  DOTNET_VERSION: "10.0.x"
  NODE_VERSION: "24"
  PNPM_VERSION: "9"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire CLI
        run: dotnet tool install --global aspire.cli

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/Web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: src/Web
        run: pnpm install --frozen-lockfile

      - name: Build bridge package
        working-directory: src/Web/packages/bridge
        run: pnpm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.ref }}" == refs/heads/master ]] || [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION=latest
          else
            SAFE_REF=$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:].-')
            VERSION="${SAFE_REF}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Setup appsettings.json for NSwag
        run: cp appsettings.example.json appsettings.json

      # Generate API client, Zod schemas, and remote functions for the web build.
      # IMPORTANT: Must run BEFORE dotnet publish (publish marks outputs as
      # up-to-date, causing post-build generation targets to be skipped).
      - name: Generate API client for web build
        working-directory: src/API/Nocturne.API
        run: dotnet build -c Release

      - name: Verify generated API client files
        run: |
          if [ ! -f src/Web/packages/app/src/lib/api/generated/passkeys.generated.remote.ts ]; then
            echo "::error::Generated API client files are missing. NSwag/remote codegen may have failed."
            ls -la src/Web/packages/app/src/lib/api/generated/ 2>/dev/null || echo "Generated directory does not exist"
            exit 1
          fi
          echo "Generated API client files found ($(ls src/Web/packages/app/src/lib/api/generated/*.generated.remote.ts | wc -l) remote files)"

      - name: Build and push Nocturne.API container
        if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        working-directory: src/API/Nocturne.API
        run: |
          dotnet publish \
            -c Release \
            -p:PublishProfile=DefaultContainer \
            -p:ContainerRegistry=${{ env.REGISTRY }} \
            -p:ContainerRepository=${{ env.IMAGE_REPOSITORY }}/nocturne-api \
            -p:ContainerImageTag=${{ steps.version.outputs.version }}

      - name: Build and push Nocturne.Web container
        if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/nocturne-web:${{ steps.version.outputs.version }} \
            --file Dockerfile.web \
            --push \
            .

      - name: Verify published image manifests
        if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        run: |
          set -euo pipefail
          images=(
            "nocturne-api"
            "nocturne-web"
          )

          for image in "${images[@]}"; do
            ref="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${image}:${{ steps.version.outputs.version }}"
            echo "Verifying manifest: $ref"
            docker buildx imagetools inspect "$ref" >/dev/null
          done

      - name: Collect image manifest status for PR comment
        id: image_status
        if: always() && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        run: |
          set +e
          images=(
            "nocturne-api"
            "nocturne-web"
          )

          {
            echo "results<<EOF"
            for image in "${images[@]}"; do
              ref="${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/${image}:${{ steps.version.outputs.version }}"
              if docker buildx imagetools inspect "$ref" >/dev/null 2>&1; then
                echo "${image}|published|${ref}"
              else
                echo "${image}|missing|${ref}"
              fi
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize published image tags
        if: always()
        run: |
          {
            echo "### Container Image Tags"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/nocturne-api:${{ steps.version.outputs.version }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/nocturne-web:${{ steps.version.outputs.version }}\`"
            echo ""
            if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
              echo "> Publishing is skipped for fork PRs."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment with published images
        if: always() && (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
        uses: actions/github-script@v7
        env:
          VERSION_TAG: ${{ steps.version.outputs.version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_REPOSITORY: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_RESULTS: ${{ steps.image_status.outputs.results }}
        with:
          script: |
            const marker = "<!-- nocturne-pr-images -->";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const tag = process.env.VERSION_TAG;
            const registry = process.env.REGISTRY;
            const imageRepo = process.env.IMAGE_REPOSITORY;
            const imageResultsRaw = process.env.IMAGE_RESULTS || "";

            const parsedResults = imageResultsRaw
              .split("\n")
              .map((l) => l.trim())
              .filter(Boolean)
              .map((line) => {
                const [image, status, ref] = line.split("|");
                return { image, status, ref };
              });

            const images = parsedResults.length > 0
              ? parsedResults
              : [
                  {
                    image: "nocturne-api",
                    status: "missing",
                    ref: `${registry}/${imageRepo}/nocturne-api:${tag}`,
                  },
                  {
                    image: "nocturne-web",
                    status: "missing",
                    ref: `${registry}/${imageRepo}/nocturne-web:${tag}`,
                  },
                ];

            const lines = [];
            lines.push(marker);
            lines.push("## Preview Container Images");
            lines.push("");
            lines.push(`Published for commit \`${context.sha.substring(0, 7)}\` with tag \`${tag}\`.`);
            lines.push("");
            lines.push("| Image | Status | Package | URI |");
            lines.push("|---|---|---|---|");

            for (const { image, status, ref } of images) {
              const packageName = encodeURIComponent(`${repo}/${image}`);
              const packageUrl = `https://github.com/${owner}/${repo}/pkgs/container/${packageName}`;
              const statusText = status === "published"
                ? "✅ Published"
                : "❌ Image not generated by build. Check CI logs";
              lines.push(`| \`${image}\` | ${statusText} | [package](${packageUrl}) | \`${ref}\` |`);
            }

            lines.push("");
            lines.push("_This comment is updated on each push to this PR._");
            const body = lines.join("\n");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100,
              }
            );

            const existing = comments.find(
              (c) => c.user?.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }

  publish-aspire-manifest:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install Aspire CLI
        run: dotnet tool install --global aspire.cli

      - name: Restore .NET dependencies
        run: dotnet restore

      # Copy appsettings.example.json to appsettings.json for NSwag client generation
      - name: Setup appsettings.json for NSwag
        run: cp appsettings.example.json appsettings.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: src/Web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: src/Web
        run: pnpm install --frozen-lockfile

      - name: Build bridge package
        working-directory: src/Web/packages/bridge
        run: pnpm run build

      - name: Build bot package
        working-directory: src/Web/packages/bot
        run: pnpm run build

      - name: Build solution
        run: dotnet build -c Debug

      - name: Determine version tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [[ "${{ github.ref }}" == refs/heads/master ]] || [[ "${{ github.ref }}" == refs/heads/main ]]; then
            VERSION=latest
          else
            SAFE_REF=$(echo "${GITHUB_REF_NAME}" | tr '/_' '-' | tr -cd '[:alnum:].-')
            VERSION="${SAFE_REF}-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Use Aspire's publish command to generate deployment manifests
      - name: Generate Aspire deployment artifacts
        working-directory: src/Aspire/Nocturne.Aspire.Host
        env:
          ContainerRegistry: ${{ env.REGISTRY }}
          ContainerRepository: ${{ env.IMAGE_REPOSITORY }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p ../../../release

          # Generate docker-compose artifacts using Aspire CLI
          # Output to repo root for easy access
          aspire publish \
            --project . \
            --publisher docker-compose \
            --output-path ../../../ \
            --no-build

          # Rename .env to .env.example (users copy and customize)
          if [ -f ../../../.env ]; then
            mv ../../../.env ../../../.env.example
          fi

          # Also generate the Aspire manifest for advanced deployments
          aspire publish \
            --project . \
            --publisher manifest \
            --output-path ../../../release

      - name: Create deployment documentation
        run: |
          cat > release/README.md << 'EOF'
          # Nocturne Aspire Deployment

          Version: ${{ github.ref_name }}
          Registry: ${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}

          ## Quick Start

          1. Copy `.env.example` to `.env` and configure your environment variables
          2. Update image references in `docker-compose.yaml` to use version `${{ steps.version.outputs.version }}`
          3. Run: `docker compose up -d`

          ## Container Images

          - `${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/nocturne-api:${{ steps.version.outputs.version }}`
          - `${{ env.REGISTRY }}/${{ env.IMAGE_REPOSITORY }}/nocturne-web:${{ steps.version.outputs.version }}`


          ## Files in this release

          - `docker-compose.yaml` - Docker Compose orchestration (generated by Aspire)
          - `aspire-manifest.json` - Aspire deployment manifest (for advanced scenarios)
          - `.env.example` - Environment variables template

          ## Deployment Options

          ### Docker Compose (Recommended)
          ```bash
          docker compose up -d
          ```

          ### Aspire Deploy (Advanced)
          ```bash
          aspire deploy --manifest aspire-manifest.json
          ```
          EOF

          # Copy docker-compose and env example into release/
          if [ -f docker-compose.yaml ]; then
            cp docker-compose.yaml release/
          fi
          if [ -f .env.example ]; then
            cp .env.example release/
          fi

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nocturne-deployment-${{ steps.version.outputs.version }}
          path: release/
          retention-days: 90

      - name: Attach artifacts to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/docker-compose.yaml
            release/.env.example
            release/aspire-manifest.json

  publish-glucose-chart:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@nightscout'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: src/Web
      - name: Publish @nightscout/glucose-chart
        run: pnpm publish --access public --no-git-checks
        working-directory: src/Web/packages/glucose-chart
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

