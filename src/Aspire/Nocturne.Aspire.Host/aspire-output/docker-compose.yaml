services:
  compose-dashboard:
    image: "mcr.microsoft.com/dotnet/nightly/aspire-dashboard:latest"
    ports:
      - "18888"
    expose:
      - "18889"
      - "18890"
    networks:
      - "aspire"
    restart: "always"
  nocturne-postgres-server:
    image: "docker.io/library/postgres:17.6"
    environment:
      POSTGRES_HOST_AUTH_METHOD: "scram-sha-256"
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_USER: "${POSTGRES_USERNAME}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    expose:
      - "5432"
    volumes:
      - type: "volume"
        target: "/var/lib/postgresql/data"
        source: "nocturne-postgres-data"
        read_only: false
    networks:
      - "aspire"
  nocturne-api:
    image: "${NOCTURNE_API_IMAGE}"
    environment:
      OTEL_DOTNET_EXPERIMENTAL_OTLP_RETRY: "in_memory"
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      HTTPS_PORTS: "${NOCTURNE_API_PORT}"
      ConnectionStrings__nocturne-postgres: "Host=nocturne-postgres-server;Port=5432;Username=${POSTGRES_USERNAME};Password=${POSTGRES_PASSWORD};Database=nocturne"
      NOCTURNE_POSTGRES_HOST: "nocturne-postgres-server"
      NOCTURNE_POSTGRES_PORT: "5432"
      NOCTURNE_POSTGRES_USERNAME: "${POSTGRES_USERNAME}"
      NOCTURNE_POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      NOCTURNE_POSTGRES_URI: "postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@nocturne-postgres-server:5432/nocturne"
      NOCTURNE_POSTGRES_JDBCCONNECTIONSTRING: "jdbc:postgresql://nocturne-postgres-server:5432/nocturne"
      NOCTURNE_POSTGRES_DATABASENAME: "nocturne"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      DemoService__Enabled: "false"
      WEB_URL: "https://nocturne-web:1612"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://compose-dashboard:18889"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_SERVICE_NAME: "nocturne-api"
    expose:
      - "${NOCTURNE_API_PORT}"
    depends_on:
      nocturne-postgres-server:
        condition: "service_started"
    networks:
      - "aspire"
  nocturne-web:
    image: "${NOCTURNE_WEB_IMAGE}"
    environment:
      PORT: "1612"
      NOCTURNE_API_API: "https://nocturne-api:${NOCTURNE_API_PORT}"
      PUBLIC_API_URL: "https://nocturne-api:${NOCTURNE_API_PORT}"
      NOCTURNE_API_URL: "https://nocturne-api:${NOCTURNE_API_PORT}"
      INSTANCE_KEY: "${INSTANCE_KEY}"
      PUBLIC_WEBSOCKET_RECONNECT_ATTEMPTS: "5"
      PUBLIC_WEBSOCKET_MAX_RECONNECT_DELAY: "30000"
      PUBLIC_WEBSOCKET_RECONNECT_DELAY: "1000"
      PUBLIC_WEBSOCKET_PING_TIMEOUT: "15000"
      PUBLIC_WEBSOCKET_PING_INTERVAL: "20000"
      PUBLIC_DEFAULT_LANGUAGE: "en"
      COOKIE_ACCESS_TOKEN_NAME: ".Nocturne.AccessToken"
      COOKIE_REFRESH_TOKEN_NAME: ".Nocturne.RefreshToken"
      OTEL_EXPORTER_OTLP_ENDPOINT: ""
      OTEL_SERVICE_NAME: "nocturne-web"
      DISCORD_BOT_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""
      SLACK_BOT_TOKEN: ""
      SLACK_SIGNING_SECRET: ""
      WHATSAPP_ACCESS_TOKEN: ""
      WHATSAPP_VERIFY_TOKEN: ""
    expose:
      - "1612"
    depends_on:
      nocturne-api:
        condition: "service_started"
    networks:
      - "aspire"
  scalar:
    image: "scalarapi/aspire-api-reference:0.8.0"
    environment:
      API_REFERENCE_CONFIG: ""
      CDN_URL: "scalar.js"
      ALLOW_SELF_SIGNED_CERTIFICATES: "False"
      DEFAULT_PROXY: "True"
      NOCTURNE_API_API: "https://nocturne-api:${NOCTURNE_API_PORT}"
    expose:
      - "8080"
    networks:
      - "aspire"
networks:
  aspire:
    driver: "bridge"
volumes:
  nocturne-postgres-data:
    driver: "local"
